name: Build plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Ustaw JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Zbuduj plugin
        run: mvn -B clean package

      - name: Wystaw gotowy jar do pobrania
        uses: actions/upload-artifact@v4
        with:
          name: Cwelostwo
          path: target/Cwelostwo.jar
