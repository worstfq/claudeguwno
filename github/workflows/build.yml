name: Build DragonSword

# Kiedy uruchamiac auto-build:
on:
  push:
    branches: [ "main", "master" ]   # przy kazdym pushu na glowna galaz
    tags: [ "v*" ]                    # oraz przy tagu wersji, np. v1.0.0
  pull_request:
    branches: [ "main", "master" ]   # przy pull requestach
  workflow_dispatch:                  # mozliwosc recznego uruchomienia z zakladki Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobranie kodu z repozytorium.
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      # 2. Instalacja Javy 21 (Temurin) wraz z cache Mavena.
      - name: Ustaw Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # 3. Kompilacja i zbudowanie pluginu -> target/DragonSword.jar
      - name: Build (mvn clean package)
        run: mvn -B clean package --file pom.xml

      # 4. Wrzucenie gotowego pliku jako artefakt do pobrania z zakladki Actions.
      - name: Wyslij artefakt DragonSword.jar
        uses: actions/upload-artifact@v4
        with:
          name: DragonSword
          path: target/DragonSword.jar
          if-no-files-found: error

      # 5. Jesli push byl tagiem (np. v1.0.0) -> utworz Release z plikiem .jar.
      - name: Utworz Release przy tagu
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/DragonSword.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
