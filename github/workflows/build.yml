name: Build

# Budowanie pluginu przy pushu, pull requescie oraz recznym uruchomieniu
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Pobranie kodu repozytorium
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Instalacja JDK 21 (Temurin) + cache zaleznosci Maven
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # 3) Kompilacja i zbudowanie pliku .jar
      - name: Build with Maven
        run: mvn -B -ntp clean package

      # 4) Wrzucenie gotowego .jar jako artefaktu
      #    Sciezka wskazuje WPROST na plik .jar, dzieki czemu pobrane
      #    archiwum zawiera goly jar (a nie zagniezdzone foldery target/).
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: TotemUlaskawienia
          path: target/TotemUlaskawienia-*.jar
          if-no-files-found: error
