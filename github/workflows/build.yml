name: Build DragonSword.jar

# Workflow uruchamia się automatycznie po każdym wgraniu (push) kodu na GitHub,
# a także można go odpalić ręcznie z zakładki "Actions" (workflow_dispatch).
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobranie kodu z repozytorium
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instalacja JDK 21 (wymagane przez pom.xml)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Budowanie projektu - powstaje target/DragonSword.jar
      - name: Build with Maven
        run: mvn clean package --no-transfer-progress

      # 4. Wystawienie zbudowanego pliku jako artefakt do ściągnięcia
      - name: Upload DragonSword.jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DragonSword
          path: target/DragonSword.jar
          if-no-files-found: error
